apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-metrics
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: victoria-metrics
  template:
    metadata:
      labels:
        app: victoria-metrics
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: disktype
                operator: In
                values:
                - ssd
      containers:
      - name: victoria-metrics
        image: victoriametrics/victoria-metrics:v1.99.0
        args:
          - "-storageDataPath=/storage"
          - "-retentionPeriod=1"
        ports:
          - containerPort: 8428
        volumeMounts:
          - name: data
            mountPath: /storage
      volumes:
        - name: data
          hostPath:
            path: /mnt/victoria-data
            type: DirectoryOrCreate